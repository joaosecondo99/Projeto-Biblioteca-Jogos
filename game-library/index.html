<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Library</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <header>
        <h1>🎮 Biblioteca de Jogos</h1>
      </header>

      <main>
        <!-- Formulário para adicionar/editar jogos -->
        <section id="form-section">
          <h2 id="form-title">Adicionar Jogo</h2>
          <form id="game-form">
            <input type="hidden" id="game-id" />
            <input type="text"  id="game-title" placeholder="Nome do jogo" required />
            <input type="text" id="game-genre" placeholder="Gênero" required />
            <input type="number" id="game-rating" placeholder="Nota (1-10)" min="1" max="10" required />
            <select id="game-status" aria-label="Status do jogo">
              <option value="Na fila">Na fila</option>
              <option value="Jogando">Jogando</option>
              <option value="Zerado">Zerado</option>
              <option value="Abandonado">Abandonado</option>
            </select>
            <button type="submit" id="form-btn">Adicionar</button>
            <button type="button" id="cancel-btn" style="display:none">Cancelar</button>
          </form>
        </section>

        <!-- Lista de jogos -->
        <section id="list-section">
          <h2>Minha Lista</h2>
          <div id="games-list"></div>
        </section>
      </main>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
