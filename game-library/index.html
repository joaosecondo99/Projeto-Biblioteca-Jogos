<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Library</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Biblioteca de Jogos</h1>
      </header>

      <main>

        <!-- Formulário para adicionar/editar jogos -->

        <section id="form-section">
          <h2 id="form-title">Adicionar Jogo</h2>
          <form id="game-form">
            <input type="hidden" id="game-id"/>
            <div class="search-wrapper">
              <input
                type="text"
                class="input-full"
                id="game-title"
                placeholder="Nome do jogo"
                required
              />
              <div id="suggestions"></div>
            </div>
            <select id="game-genre" aria-label="Gênero do jogo" required>
              <option value="" disabled selected>🎮 Gênero</option>
              <option value="Aventura">⚔️ Aventura</option>
              <option value="RPG">🧙 RPG</option>
              <option value="Tiro">🔫 Tiro</option>
              <option value="Esporte">⚽ Esporte</option>
              <option value="Corrida">🏎️ Corrida</option>
              <option value="Luta">🥊 Luta</option>
              <option value="Terror">👻 Terror</option>
              <option value="Estratégia">🧠 Estratégia</option>
              <option value="Plataforma">🍄 Plataforma</option>
              <option value="Metroidvania">🗺️ Metroidvania</option>
              <option value="Simulação">🏗️ Simulação</option>
            </select>
            <div class="input-rating-wrapper">
              <span class="rating-star">⭐</span>
              <input
                type="number"
                id="game-rating"
                placeholder="Nota (1-10)"
                min="1"
                max="10"
                required
              />
            </div>
            <select id="game-status" aria-label="Status do jogo">
              <option value="Na fila">Na fila</option>
              <option value="Jogando">Jogando</option>
              <option value="Zerado">Zerado</option>
              <option value="Abandonado">Abandonado</option>
            </select>
            <button type="submit" id="form-btn">Adicionar</button>
          </form>
        </section>

        <!-- Status dos jogos -->

        <section id="stats-section">
          <div class="stat-card" id="stat-total">
            <span class="stat-number">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-card" id="stat-zerado">
            <span class="stat-number">0</span>
            <span class="stat-label">Zerados</span>
          </div>
          <div class="stat-card" id="stat-jogando">
            <span class="stat-number">0</span>
            <span class="stat-label">Jogando</span>
          </div>
          <div class="stat-card" id="stat-fila">
            <span class="stat-number">0</span>
            <span class="stat-label">Na Fila</span>
          </div>
          <div class="stat-card" id="stat-abandonado">
            <span class="stat-number">0</span>
            <span class="stat-label">Abandonados</span>
          </div>
        </section>

        <!-- Lista de jogos -->

        <section id="list-section">
          <h2>Minha Lista</h2>
          <div id="games-list"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
